<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
      --text:#e6edf3;--muted:#7d8590;--accent:#58a6ff;
      --green:#3fb950;--red:#f85149;--orange:#d29922;
      --red-bg:rgba(248,81,73,0.08);--green-bg:rgba(63,185,80,0.08);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* ── Header ── */
    .app-header{
      position:sticky;top:0;z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:0 24px;height:58px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .app-header h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
    .app-header h1 span{color:var(--muted);font-weight:400;font-size:13px}
    .header-actions{display:flex;gap:8px;flex-shrink:0}
    .btn{
      height:32px;padding:0 14px;border-radius:6px;
      border:1px solid var(--border);background:var(--surface2);
      color:var(--text);font-size:13px;font-weight:500;
      cursor:pointer;display:inline-flex;align-items:center;gap:6px;
      transition:all .15s;white-space:nowrap;
    }
    .btn:hover{background:var(--border);border-color:var(--muted)}
    .btn-primary{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:700}
    .btn-primary:hover{opacity:.88;background:var(--accent)}
    .btn-danger{background:rgba(248,81,73,.15);border-color:rgba(248,81,73,.3);color:var(--red)}
    .btn-danger:hover{background:rgba(248,81,73,.25)}
    .btn-success{background:#238636;border-color:#2ea043;color:#fff;font-weight:700}
    .btn-success:hover{background:#2ea043}
    .btn-success:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
    /* ── Generate order spinner ── */
    .spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);
      border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* ── Toast ── */
    .toast{
      position:fixed;bottom:24px;right:24px;z-index:200;
      background:#238636;color:#fff;padding:12px 20px;border-radius:8px;
      font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.4);
      display:none;align-items:center;gap:10px;
    }
    .toast.show{display:flex}
    .toast.error{background:#b91c1c}

    /* ── Stats bar ── */
    .stats-bar{
      background:var(--surface2);border-bottom:1px solid var(--border);
      padding:9px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
    }
    .stat{display:flex;align-items:center;gap:6px;font-size:13px}
    .stat-label{color:var(--muted)}
    .stat-value{font-weight:700}
    .stat-value.red{color:var(--red)}
    .stat-value.green{color:var(--green)}
    .pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;
    }
    .pill-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.2)}
    .pill-muted{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
    .vendor-pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}

    /* ── Layout ── */
    .layout{display:flex}

    /* ── Sidebar ── */
    .sidebar{
      width:196px;flex-shrink:0;
      background:var(--surface);border-right:1px solid var(--border);
      padding:12px 0;
      position:sticky;top:105px;
      height:calc(100vh - 105px);overflow-y:auto;
    }
    .sidebar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:8px 16px 4px}
    .sidebar-item{
      display:flex;align-items:center;gap:8px;
      padding:7px 16px;font-size:13px;color:var(--muted);
      cursor:pointer;transition:all .1s;
      border-left:2px solid transparent;text-decoration:none;
    }
    .sidebar-item:hover{color:var(--text);background:var(--surface2)}
    .sidebar-item.active{color:var(--text);border-left-color:var(--accent);background:rgba(88,166,255,.07)}
    .sidebar-item .s-icon{font-size:14px;flex-shrink:0}
    .sidebar-item .s-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar-item .s-count{
      font-size:10px;font-weight:700;color:var(--red);
      background:var(--red-bg);padding:1px 6px;border-radius:10px;
      display:none;flex-shrink:0;
    }
    .sidebar-item .s-count.show{display:block}

    /* ── Content ── */
    .content{flex:1;padding:24px;overflow-x:hidden}

    /* ── Category section ── */
    .cat-section{margin-bottom:36px;scroll-margin-top:115px}
    .cat-title{
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;
      color:var(--muted);margin-bottom:12px;padding-bottom:8px;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;
    }
    .cat-badge{
      font-size:11px;font-weight:700;color:var(--red);
      background:var(--red-bg);padding:1px 8px;border-radius:10px;
      letter-spacing:0;display:none;
    }
    .cat-badge.show{display:inline-flex}

    /* ── Items grid ── */
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}

    /* ── Item card ── */
    .item-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;transition:border-color .15s;
    }
    .item-card.needs-order{border-color:rgba(248,81,73,.45);background:rgba(248,81,73,.04)}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
    .item-name{font-size:13px;font-weight:600;line-height:1.3}
    .vendor-tag{
      font-size:10px;color:var(--muted);background:var(--surface2);
      padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;
      border:1px solid var(--border);
    }
    .card-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:end}
    .field{display:flex;flex-direction:column;gap:3px}
    .field-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
    .field-static{font-size:20px;font-weight:700;color:var(--muted);line-height:1.1}
    .order-qty{font-size:20px;font-weight:700;line-height:1.1}
    .order-qty.positive{color:var(--red)}
    .order-qty.zero{color:var(--green)}
    .order-qty.empty{color:var(--muted)}
    .field input[type=number]{
      width:100%;background:var(--surface2);border:1px solid var(--border);
      border-radius:6px;color:var(--text);font-size:20px;font-weight:700;
      padding:4px 6px;text-align:center;outline:none;
      -moz-appearance:textfield;transition:border-color .15s;
    }
    .field input[type=number]::-webkit-outer-spin-button,
    .field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .field input[type=number]:focus{border-color:var(--accent)}
    .item-card.needs-order .field input[type=number]{border-color:rgba(248,81,73,.3)}
    .card-footer{
      margin-top:8px;font-size:10px;color:var(--muted);
      display:flex;justify-content:space-between;
    }

    /* ── Vendor panel ── */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100}
    .overlay.open{display:block}
    .vendor-panel{
      position:fixed;top:0;right:-430px;bottom:0;width:430px;
      background:var(--surface);border-left:1px solid var(--border);
      z-index:101;overflow-y:auto;transition:right .25s ease;
    }
    .vendor-panel.open{right:0}
    .panel-header{
      padding:18px 20px;border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center;
      position:sticky;top:0;background:var(--surface);z-index:1;
    }
    .panel-header h2{font-size:15px;font-weight:600}
    .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0 4px}
    .close-btn:hover{color:var(--text)}
    .vendor-section{padding:14px 20px;border-bottom:1px solid var(--border)}
    .vendor-section h3{
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
      color:var(--muted);margin-bottom:10px;
    }
    .vendor-section h3 em{color:var(--red);font-style:normal;margin-left:6px;font-size:12px}
    .vendor-row{
      display:flex;align-items:center;padding:7px 0;font-size:13px;
      border-bottom:1px solid rgba(48,54,61,.5);
    }
    .vendor-row:last-child{border-bottom:none}
    .v-name{flex:1}
    .v-qty{font-weight:700;color:var(--red);margin-left:12px;font-size:15px;min-width:24px;text-align:right}
    .v-price{color:var(--muted);font-size:11px;margin-left:8px;min-width:50px;text-align:right}
    .no-orders{padding:32px 20px;color:var(--muted);font-size:13px;text-align:center;line-height:1.6}

    /* ── Print ── */
    @media print{
      .app-header .header-actions,.stats-bar .vendor-pills,.sidebar,.overlay,.vendor-panel{display:none!important}
      .app-header{position:relative;height:auto;padding:12px 20px}
      .layout{display:block}
      .content{padding:8px}
      .items-grid{grid-template-columns:repeat(4,1fr);gap:6px}
      .item-card{break-inside:avoid;border:1px solid #ccc;background:white;padding:8px}
      .item-card.needs-order{border-color:#c00;background:#fff5f5}
      body,.item-name,.vendor-tag{background:white;color:#111}
      .vendor-tag{background:#eee;color:#555;border-color:#ddd}
      .field-label,.card-footer{color:#666}
      .field-static{color:#333}
      .order-qty.positive{color:#c00}
      .order-qty.zero{color:#090}
      .field input[type=number]{background:#f5f5f5;border-color:#ccc;color:#111}
      .cat-title{color:#444;border-color:#ccc}
    }
  </style>
</head>

<header class="app-header">
  <h1>🍽️ Kitchen Order Sheet <span id="dateLabel"></span></h1>
  <div class="header-actions">
    <button class="btn btn-danger" onclick="resetAll()">↺ Reset</button>
    <button class="btn" onclick="togglePanel()">📋 By Vendor</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-success" id="generateBtn" onclick="generateOrder()" disabled title="Fill in all on-hand counts to enable">🚀 Generate Order</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-label">Need to Order</span><span class="stat-value red" id="needCount">–</span></div>
  <div class="stat"><span class="stat-label">Stocked</span><span class="stat-value green" id="stockedCount">–</span></div>
  <div class="stat"><span class="stat-label">Not Counted</span><span class="stat-value" id="uncountedCount">–</span></div>
  <div class="vendor-pills" id="vendorPills"></div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content"></main>
</div>

<div id="toast" class="toast"></div>
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="vendor-panel" id="vendorPanel">
  <div class="panel-header">
    <h2>Orders by Vendor</h2>
    <button class="close-btn" onclick="togglePanel()">×</button>
  </div>
  <div id="vendorPanelBody"></div>
</div>

// ── State ──────────────────────────────────────────────
const STATE_KEY = 'kitchen_order_v1';
let state = {};

function loadState(){
  try{ const s = localStorage.getItem(STATE_KEY); if(s) state = JSON.parse(s); }catch(e){}
}
function saveState(){ try{ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }catch(e){} }
function getOnHand(id){ return state[id] !== undefined ? state[id] : ''; }
function setOnHand(id, val){
  if(val===''||val===null){ delete state[id]; } else { state[id]=parseFloat(val); }
  saveState();
}

function calcOrder(buildTo, raw){
  if(raw===''||raw===undefined||raw===null) return null;
  return Math.max(0, Math.ceil(buildTo - parseFloat(raw)));
}

// ── Render sidebar ──────────────────────────────────────
function renderSidebar(){
  document.getElementById('sidebar').innerHTML =
    '<div class="sidebar-label">Sections</div>' +
    CATEGORIES.map(c=>`
      <a class="sidebar-item" href="#${c.id}">
        <span class="s-icon">${c.icon}</span>
        <span class="s-name">${c.name}</span>
        <span class="s-count" id="sc-${c.id}"></span>
      </a>`).join('');
}

// ── Render content ──────────────────────────────────────
function renderContent(){
  document.getElementById('content').innerHTML = CATEGORIES.map(cat=>`
    <section class="cat-section" id="${cat.id}">
      <div class="cat-title">
        ${cat.icon} ${cat.name}
        <span class="cat-badge" id="cb-${cat.id}"></span>
      </div>
      <div class="items-grid">${cat.items.map(renderCard).join('')}</div>
    </section>`).join('');
}

function renderCard(item){
  const oh = getOnHand(item.id);
  const qty = calcOrder(item.buildTo, oh);
  const needsOrder = qty !== null && qty > 0;
  const orderText = qty===null ? '–' : qty===0 ? '✓' : qty;
  const orderCls = qty===null ? 'empty' : qty===0 ? 'zero' : 'positive';
  return `
    <div class="item-card${needsOrder?' needs-order':''}" id="card-${item.id}">
      <div class="card-top">
        <div class="item-name">${item.name}</div>
        <div class="vendor-tag">${item.vendor}</div>
      </div>
      <div class="card-fields">
        <div class="field">
          <div class="field-label">PAR</div>
          <div class="field-static">${item.buildTo}</div>
        </div>
        <div class="field">
          <div class="field-label">On Hand</div>
          <input type="number" min="0" step="0.5"
            value="${oh}"
            placeholder="–"
            oninput="updateItem(${item.id},this.value)"
            id="inp-${item.id}" />
        </div>
        <div class="field">
          <div class="field-label">Order</div>
          <div class="order-qty ${orderCls}" id="oq-${item.id}">${orderText}</div>
        </div>
      </div>
      ${(item.price||item.unit)?`<div class="card-footer">
        <span>${item.unit||''}</span>
        ${item.price?`<span>$${item.price.toFixed(2)}</span>`:''}
      </div>`:''}
    </div>`;
}

// ── Live update ─────────────────────────────────────────
function updateItem(id, val){
  setOnHand(id, val==='' ? '' : val);
  let item;
  for(const cat of CATEGORIES){ item=cat.items.find(i=>i.id===id); if(item) break; }
  if(!item) return;

  const oh = val==='' ? '' : parseFloat(val);
  const qty = calcOrder(item.buildTo, oh);
  const needsOrder = qty!==null && qty>0;
  const orderText = qty===null ? '–' : qty===0 ? '✓' : qty;
  const orderCls  = qty===null ? 'empty' : qty===0 ? 'zero' : 'positive';

  document.getElementById(`oq-${id}`).textContent = orderText;
  document.getElementById(`oq-${id}`).className = `order-qty ${orderCls}`;
  document.getElementById(`card-${id}`).className = `item-card${needsOrder?' needs-order':''}`;
  updateStats();
}

// ── Stats ───────────────────────────────────────────────
function updateStats(){
  let need=0, stocked=0, uncounted=0;
  const vendorCounts={};

  for(const cat of CATEGORIES){
    let catNeed=0;
    for(const item of cat.items){
      const oh=getOnHand(item.id);
      if(oh===''||oh===undefined){ uncounted++; continue; }
      const qty=calcOrder(item.buildTo, oh);
      if(qty>0){
        need++; catNeed++;
        vendorCounts[item.vendor]=(vendorCounts[item.vendor]||0)+1;
      } else { stocked++; }
    }
    const sc=document.getElementById(`sc-${cat.id}`);
    const cb=document.getElementById(`cb-${cat.id}`);
    if(catNeed>0){
      sc.textContent=catNeed; sc.classList.add('show');
      cb.textContent=`${catNeed} to order`; cb.classList.add('show');
    } else {
      sc.classList.remove('show');
      cb.classList.remove('show');
    }
  }

  document.getElementById('needCount').textContent=need;
  document.getElementById('stockedCount').textContent=stocked;
  document.getElementById('uncountedCount').textContent=uncounted;

  // Enable "Generate Order" only when everything has been counted
  const genBtn = document.getElementById('generateBtn');
  if(uncounted === 0){
    genBtn.removeAttribute('disabled');
    genBtn.title = 'All items counted — click to generate the weekly order';
  } else {
    genBtn.setAttribute('disabled','');
    genBtn.title = `Fill in all on-hand counts first (${uncounted} remaining)`;
  }

  document.getElementById('vendorPills').innerHTML=
    Object.entries(vendorCounts)
      .sort((a,b)=>b[1]-a[1])
      .map(([v,c])=>`<span class="pill pill-red">${v} <strong>${c}</strong></span>`)
      .join('');
}

// ── Vendor panel ────────────────────────────────────────
function togglePanel(){
  const panel=document.getElementById('vendorPanel');
  const overlay=document.getElementById('overlay');
  const opening=!panel.classList.contains('open');
  if(opening) buildVendorPanel();
  panel.classList.toggle('open',opening);
  overlay.classList.toggle('open',opening);
}

function buildVendorPanel(){
  const vendorMap={};
  for(const cat of CATEGORIES){
    for(const item of cat.items){
      const oh=getOnHand(item.id);
      if(oh===''||oh===undefined) continue;
      const qty=calcOrder(item.buildTo, oh);
      if(qty>0){
        if(!vendorMap[item.vendor]) vendorMap[item.vendor]=[];
        vendorMap[item.vendor].push({...item, orderQty:qty});
      }
    }
  }
  const vendors=Object.keys(vendorMap).sort();
  const body=document.getElementById('vendorPanelBody');
  if(!vendors.length){
    body.innerHTML='<div class="no-orders">No items to order yet.<br>Enter on-hand counts to generate your order list.</div>';
    return;
  }
  body.innerHTML=vendors.map(v=>`
    <div class="vendor-section">
      <h3>${v}<em>${vendorMap[v].length} item${vendorMap[v].length>1?'s':''}</em></h3>
      ${vendorMap[v].map(item=>`
        <div class="vendor-row">
          <span class="v-name">${item.name}</span>
          <span class="v-qty">${item.orderQty}</span>
          ${item.price?`<span class="v-price">$${item.price.toFixed(2)}</span>`:'<span class="v-price"></span>'}
        </div>`).join('')}
    </div>`).join('');
}

// ── Reset ───────────────────────────────────────────────
function resetAll(){
  if(!confirm('Clear all on-hand counts and start over?')) return;
  state={};
  saveState();
  for(const cat of CATEGORIES){
    for(const item of cat.items){
      const inp=document.getElementById(`inp-${item.id}`);
      if(inp) inp.value='';
      const oq=document.getElementById(`oq-${item.id}`);
      if(oq){ oq.textContent='–'; oq.className='order-qty empty'; }
      const card=document.getElementById(`card-${item.id}`);
      if(card) card.className='item-card';
    }
  }
  updateStats();
}

// ── Generate Order trigger ──────────────────────────────
// POSTs on-hand counts to /api/generate_order (Vercel serverless).
// The API returns the complete order HTML which is opened in a new tab.

function showToast(msg, isError=false, duration=5000){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(isError?' error':'');
  setTimeout(()=>t.classList.remove('show'), duration);
}

async function generateOrder(){
  const btn = document.getElementById('generateBtn');

  // Collect on-hand counts: {itemName: onHandValue}
  const counts = {};
  for(const cat of CATEGORIES){
    for(const item of cat.items){
      const oh = getOnHand(item.id);
      if(oh !== '' && oh !== undefined && oh !== null){
        counts[item.name] = parseFloat(oh);
      }
    }
  }

  // Show spinner
  btn.innerHTML = '<span class="spin"></span> Generating…';
  btn.setAttribute('disabled','');

  try {
    const resp = await fetch('/api/generate_order', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(counts),
    });

    if(!resp.ok){
      const err = await resp.json().catch(()=>({error:'Unknown server error'}));
      showToast('❌ Error: ' + (err.error || resp.statusText), true, 8000);
    } else {
      // API returns full HTML — open it in a new tab via Blob URL
      const html = await resp.text();
      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      const url  = URL.createObjectURL(blob);
      window.open(url, '_blank');
      showToast('✅ Weekly order generated!');
    }
  } catch(e) {
    showToast('❌ Request failed: ' + e.message, true, 8000);
  }

  // Restore button
  btn.innerHTML = '🚀 Generate Order';
  btn.removeAttribute('disabled');
}

// ── Init ────────────────────────────────────────────────
loadState();
renderSidebar();
renderContent();
updateStats();

document.getElementById('dateLabel').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

// Highlight active sidebar section on scroll
const io = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.sidebar-item').forEach(el=>{
        el.classList.toggle('active', el.getAttribute('href')==='#'+e.target.id);
      });
    }
  });
},{threshold:0.25,rootMargin:'-110px 0px -55% 0px'});
document.querySelectorAll('.cat-section').forEach(el=>io.observe(el));
</script>
