name: Scrape Vendor Prices

on:
  schedule:
    # Monday 6:00 AM Eastern (11:00 UTC — EDT offset)
    - cron: '0 11 * * 1'
    # Thursday 6:00 AM Eastern (11:00 UTC)
    - cron: '0 11 * * 4'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  usfoods:
    name: US Foods
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape US Foods prices
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          USF_REFRESH_TOKEN:  ${{ secrets.USF_REFRESH_TOKEN }}
          USF_CONFIG:         ${{ secrets.USF_CONFIG }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          PRICE_SEASON:       ${{ vars.PRICE_SEASON }}
        run: python3 scrape_usfoods.py

  pfg:
    name: PFG CustomerFirst
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape PFG prices
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          PFG_REFRESH_TOKEN:  ${{ secrets.PFG_REFRESH_TOKEN }}
          PFG_CONFIG:         ${{ secrets.PFG_CONFIG }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          PRICE_SEASON:       ${{ vars.PRICE_SEASON }}
        run: python3 scrape_pfg.py

  gfs:
    name: GFS Gordon Food Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape GFS prices
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GFS_COOKIES:   ${{ secrets.GFS_COOKIES }}
          PRICE_SEASON:  ${{ vars.PRICE_SEASON }}
        run: python3 scrape_gfs.py

  sysco:
    name: Sysco
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape Sysco prices
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          SYSCO_EMAIL:     ${{ secrets.SYSCO_EMAIL }}
          SYSCO_PASSWORD:  ${{ secrets.SYSCO_PASSWORD }}
          PRICE_SEASON:    ${{ vars.PRICE_SEASON }}
        run: python3 scrape_sysco.py

  report:
    name: Basket Report
    needs: [usfoods, pfg, gfs, sysco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate basket report
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python3 basket_report.py >> $GITHUB_STEP_SUMMARY
