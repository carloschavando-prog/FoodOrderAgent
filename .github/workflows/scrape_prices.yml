name: Scrape Vendor Prices

on:
  schedule:
    # Daily 5:00 AM Eastern during daylight time (09:00 UTC).
    # GitHub cron runs in UTC; adjust to 10:00 UTC after the DST change if needed.
    - cron: '0 9 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

concurrency:
  group: vendor-price-scrape
  cancel-in-progress: false

jobs:
  usfoods:
    name: US Foods
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape US Foods prices
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          USF_REFRESH_TOKEN:  ${{ secrets.USF_REFRESH_TOKEN }}
          USF_CONFIG:         ${{ secrets.USF_CONFIG }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          PRICE_SEASON:       ${{ vars.PRICE_SEASON }}
        run: python3 scrape_usfoods.py

  pfg:
    name: PFG CustomerFirst
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape PFG prices
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          PFG_REFRESH_TOKEN:  ${{ secrets.PFG_REFRESH_TOKEN }}
          PFG_CONFIG:         ${{ secrets.PFG_CONFIG }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          PRICE_SEASON:       ${{ vars.PRICE_SEASON }}
        run: python3 scrape_pfg.py

  gfs:
    name: GFS Gordon Food Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape GFS prices
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GFS_COOKIES:   ${{ secrets.GFS_COOKIES }}
          PRICE_SEASON:  ${{ vars.PRICE_SEASON }}
        run: python3 scrape_gfs.py

  sysco:
    name: Sysco
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scrape Sysco prices
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          SYSCO_EMAIL:     ${{ secrets.SYSCO_EMAIL }}
          SYSCO_PASSWORD:  ${{ secrets.SYSCO_PASSWORD }}
          SYSCO_COOKIES:   ${{ secrets.SYSCO_COOKIES }}
          PRICE_SEASON:    ${{ vars.PRICE_SEASON }}
        run: python3 scrape_sysco.py

  report:
    name: Basket Report
    needs: [usfoods, pfg, gfs, sysco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate basket report
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python3 basket_report.py >> $GITHUB_STEP_SUMMARY

      # Report the run's outcome to the Agent Control Board (agent_key=ordering).
      # No-ops unless the CONTROL_BOARD_URL secret is set. Never fails the job.
      - name: Report status to Control Board
        if: always()
        env:
          CONTROL_BOARD_URL:    ${{ secrets.CONTROL_BOARD_URL }}
          CONTROL_BOARD_SECRET: ${{ secrets.CONTROL_BOARD_SECRET }}
          USF_RESULT: ${{ needs.usfoods.result }}
          PFG_RESULT: ${{ needs.pfg.result }}
          GFS_RESULT: ${{ needs.gfs.result }}
          SYS_RESULT: ${{ needs.sysco.result }}
        run: |
          if [ -z "$CONTROL_BOARD_URL" ]; then
            echo "CONTROL_BOARD_URL not set — skipping control board report"
            exit 0
          fi
          FAILED=""
          [ "$USF_RESULT" != "success" ] && FAILED="$FAILED US-Foods"
          [ "$PFG_RESULT" != "success" ] && FAILED="$FAILED PFG"
          [ "$GFS_RESULT" != "success" ] && FAILED="$FAILED GFS"
          [ "$SYS_RESULT" != "success" ] && FAILED="$FAILED Sysco"
          if [ -n "$FAILED" ]; then
            PAYLOAD=$(printf '{"agent_key":"ordering","event":"failed","message":"Vendor price scrape failed:%s"}' "$FAILED")
          else
            PAYLOAD='{"agent_key":"ordering","event":"finished","output":"All 4 vendor price scrapes succeeded"}'
          fi
          curl -s -X POST "$CONTROL_BOARD_URL/api/report" \
            -H "content-type: application/json" \
            -H "x-report-secret: $CONTROL_BOARD_SECRET" \
            -d "$PAYLOAD" || true
